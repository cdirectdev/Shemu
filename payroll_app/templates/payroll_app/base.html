<!DOCTYPE html>
<!-- base template — every other page extends this
     so the navbar and footer show up everywhere without rewriting them -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shemu Payroll</title>

  <!-- bootstrap for basic styling and layout -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    /* just a light grey background for the whole page */
    body {
      background-color: #f8f9fa;
      min-height: 100vh;        /* page fills the full screen height */
      display: flex;
      flex-direction: column;   /* stacks navbar, content, footer vertically */
    }

    /* main content stretches to fill whatever space is left
       so the footer doesn't float up on short pages */
    main {
      flex: 1;
      padding: 2rem;
    }

    /* footer stays at the bottom */
    footer {
      background-color: #343a40;
      color: #adb5bd;
      text-align: center;
      padding: 1rem;
      font-size: 0.85rem;
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- navbar — using bootstrap's built-in dark navbar
       the brand "Shemu" links to the employees page (home)
       the two nav links go to employees and payslips -->
  <nav class="navbar navbar-expand navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="{% url 'employees' %}">Shemu</a>
    <ul class="navbar-nav">
      <!-- active class highlights whichever page you're currently on -->
      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'employees' %}active{% endif %}"
           href="{% url 'employees' %}">Employees</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'payslips' %}active{% endif %}"
           href="{% url 'payslips' %}">Payslips</a>
      </li>
    </ul>
  </nav>

  <main>
    <div class="container">
      {% block content %}
      
      {% endblock %}
    </div>
  </main>

  <!-- footer — just shows the year as required by the specs -->
  <footer>
    &copy; 2026 Shemu Payroll System
  </footer>

  <!-- bootstrap JS at the bottom so it doesn't slow down the page -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_scripts %}{% endblock %}

</body>
</html>
