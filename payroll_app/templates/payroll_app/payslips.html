{% extends 'payroll_app/base.html' %}
{% block content %}

<h1>Payslips</h1>

<form method="POST" class="mb-4">
{% csrf_token %}

<select name="payroll_for" class="form-control mb-2">
<option value="all">All Employees</option>
{% for e in employees %}
<option value="{{ e.id_number }}">{{ e.id_number }}</option>
{% endfor %}
</select>

<select name="month" class="form-control mb-2">
<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>
</select>

<input type="text" name="year" placeholder="2026" class="form-control mb-2">

<select name="cycle" class="form-control mb-2">
<option value="1">1</option>
<option value="2">2</option>
</select>

<button class="btn btn-success">Generate Payroll</button>

</form>

<table class="table table-striped">
<tr>
<th>ID</th>
<th>Date</th>
<th>Cycle</th>
<th>Total</th>
<th>View</th>
</tr>

{% for s in slips %}
<tr>
<td>{{ s.getIDNumber }}</td>
<td>{{ s.getMonth }} {{ s.getDate_range }}, {{ s.getYear }}</td>
<td>{{ s.getPay_cycle }}</td>
<td>{{ s.getTotal_pay }}</td>
<td>
<a href="{% url 'view_payslip' s.pk %}" class="btn btn-primary btn-sm">
View
</a>
</td>
</tr>
{% endfor %}
</table>

{% endblock %}
